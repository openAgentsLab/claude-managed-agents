apiVersion: v1
kind: Namespace
metadata:
  name: forge
---
apiVersion: v1
kind: Namespace
metadata:
  name: forge-sandbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge
  namespace: forge
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
  namespace: forge
data:
  forge.yaml: |
    server:
      http_addr: ":8080"

    log:
      level: "info"
      format: "json"

    model:
      provider: "anthropic"
      base_url: "https://api.anthropic.com"
      model: "claude-sonnet-4-6"

    storage:
      postgres:
        default:
          dsn: ""          # 由 Secret 环境变量 FORGE_STORAGE_DSN 覆盖
      redis:
        default:
          addr: "redis-host:6379"    # 替换为实际 Redis 地址
          db: 0

    session:
      driver: "postgres.default"

    memory:
      static:
        driver: "postgres.default"

    sandbox:
      driver: "k8s"
      options:
        namespace: "forge-sandbox"
        image: "your-registry/ai-forge-toolserver:latest"  # 替换
        workspace_size: "5Gi"
        storage_class: "standard"
        service_account: "forge-sandbox-runner"

    tasks:
      driver: "postgres.default"

  forge.mcp.yaml: |
    mcp:
      servers: []
