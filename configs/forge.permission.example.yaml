# forge.permission.example.yaml — 权限系统配置示例
# 复制为 forge.permission.local.yaml 后根据实际场景调整。
# 对应 PermissionConfig，字段直接写在顶层（无需 "permission:" 包裹）
#
# 优先级（高→低）：CLI --mode/--allow/--deny > 此文件 > settings.json（用户/项目）
# CLI --allow/--deny 在此文件规则之上追加，不替换。

# ─────────────────────────────────────────────────────────────────
# 权限模式（mode）
# ─────────────────────────────────────────────────────────────────
#
#   default          — 受限操作前弹窗询问用户（推荐开发环境）
#   plan             — 先展示完整执行计划，用户确认后再运行
#   acceptEdits      — 自动批准所有文件读写操作，其他操作仍询问
#   dontAsk          — 关闭所有询问，全部自动通过（CI/CD 流水线）
#   bypassPermissions — 忽略所有规则，用于特权管理脚本
#
mode: "default"

# ─────────────────────────────────────────────────────────────────
# 静态允许规则（allow_rules）
#
# 格式：ToolName(pattern)
#   pattern 为通配符字符串，* 匹配任意内容。
#   Bash 工具：pattern 匹配完整命令字符串（含参数）。
#   文件工具：pattern 匹配文件路径。
#
# 这些规则始终允许，无需用户确认，即使 mode=default。
# ─────────────────────────────────────────────────────────────────
allow_rules: []

  # ── 版本控制 ────────────────────────────────────────────────────
  # - "Bash(git status)"          # 只允许 git status
  # - "Bash(git log*)"            # git log 及其所有参数变体
  # - "Bash(git:*)"               # 所有 git 子命令（* 匹配含空格的完整命令）
  # - "Bash(gh:*)"                # GitHub CLI 全部命令

  # ── 包管理器 ────────────────────────────────────────────────────
  # - "Bash(npm install*)"        # 只允许 npm install，不允许 npm publish
  # - "Bash(npm:*)"               # npm 全部子命令
  # - "Bash(go build*)"
  # - "Bash(go test*)"
  # - "Bash(go:*)"                # go 工具链全部命令

  # ── 文件系统读取 ─────────────────────────────────────────────────
  # - "ReadFile(*)"               # 允许读取任意文件
  # - "ReadFile(src/*)"           # 只允许读取 src/ 目录
  # - "ReadFile(*.go)"            # 只允许读取 .go 文件（路径通配）

  # ── 文件系统写入 ─────────────────────────────────────────────────
  # - "WriteFile(src/*)"          # 只允许写入 src/ 目录
  # - "WriteFile(*.md)"           # 只允许写入 Markdown 文件

  # ── 网络 ─────────────────────────────────────────────────────────
  # - "Bash(curl https://api.github.com*)"  # 只允许访问 GitHub API
  # - "WebSearch(*)"              # 允许网络搜索工具

  # ── 测试与构建（CI 场景）────────────────────────────────────────
  # - "Bash(make:*)"
  # - "Bash(pytest*)"
  # - "Bash(cargo:*)"

# ─────────────────────────────────────────────────────────────────
# 静态拒绝规则（deny_rules）
#
# 这些规则始终拒绝，即使 mode=dontAsk 或 allow_rules 中有匹配。
# deny 优先级高于 allow。
# ─────────────────────────────────────────────────────────────────
deny_rules: []

  # ── 危险文件操作 ────────────────────────────────────────────────
  # - "Bash(rm -rf*)"             # 禁止递归强制删除
  # - "Bash(rm:*)"                # 禁止所有 rm 命令（保守策略）
  # - "Bash(mkfs*)"               # 禁止格式化磁盘

  # ── 凭证与敏感文件 ──────────────────────────────────────────────
  # - "ReadFile(*/.env)"          # 禁止读取 .env 文件
  # - "ReadFile(*id_rsa*)"        # 禁止读取 SSH 私钥
  # - "WriteFile(*/.ssh/*)"       # 禁止写入 SSH 目录

  # ── 网络出站限制 ─────────────────────────────────────────────────
  # - "Bash(curl:*)"              # 禁止所有 curl（结合 allow_rules 白名单使用）
  # - "Bash(wget:*)"

  # ── Git 破坏性操作 ───────────────────────────────────────────────
  # - "Bash(git push --force*)"   # 禁止强制推送
  # - "Bash(git reset --hard*)"   # 禁止硬重置
  # - "Bash(git clean -f*)"       # 禁止强制清理工作区

  # ── 系统级命令 ──────────────────────────────────────────────────
  # - "Bash(sudo:*)"              # 禁止 sudo（生产多租户必须）
  # - "Bash(chmod 777*)"          # 禁止 chmod 777
  # - "Bash(kill:*)"              # 禁止 kill 进程

# ─────────────────────────────────────────────────────────────────
# 常用场景速查
# ─────────────────────────────────────────────────────────────────
#
# 场景 A：本地开发，宽松策略
#   mode: "acceptEdits"
#   allow_rules:
#     - "Bash(git:*)"
#     - "Bash(go:*)"
#     - "Bash(npm:*)"
#   deny_rules:
#     - "Bash(rm -rf*)"
#
# 场景 B：CI/CD 无人值守
#   mode: "dontAsk"
#   allow_rules:
#     - "Bash(make:*)"
#     - "Bash(go test:*)"
#     - "Bash(git:*)"
#   deny_rules:
#     - "Bash(git push --force*)"
#     - "Bash(sudo:*)"
#
# 场景 C：生产多租户（最严格）
#   mode: "default"
#   deny_rules:
#     - "Bash(sudo:*)"
#     - "Bash(rm -rf*)"
#     - "Bash(git push --force*)"
#     - "ReadFile(*/.env)"
